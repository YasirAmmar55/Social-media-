<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Axial Woodworking</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#000;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.container{
    width:100%;
    max-width:420px;
}

.card{
    background:#111;
    border:1px solid #222;
    border-radius:30px;
    overflow:hidden;
    box-shadow:0 20px 50px rgba(0,0,0,0.5);
}

.top-line{
    height:6px;
    background:#00ff88;
}

.content{
    padding:40px 30px;
    text-align:center;
}

.logo-box{
    width:180px;
    margin:auto;
    background:#fff;
    border-radius:25px;
    padding:px;
    border:4px solid #00ff88;
    box-shadow:0 10px 30px rgba(0,255,136,0.2);
}
.logo-circle{
    width:190px;
    height:190px;
    margin:auto;
    border-radius:50%;
    background:#000;
    border:5px solid #00ff88;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    box-shadow:0 0 35px rgba(0,255,136,0.35);
}

.logo-circle img{
    width:100%;
    height:100%;
    object-fit:contain;
    transform:scale(1.15);
}





.brand{
    font-size:42px;
    font-weight:700;
    margin-top:25px;
    letter-spacing:3px;
}

.sub{
    color:#00ff88;
    text-transform:uppercase;
    letter-spacing:6px;
    margin-top:8px;
    font-size:13px;
}

.about{
    color:#cfcfcf;
    font-size:15px;
    line-height:1.7;
    margin-top:25px;
}

.links{
    margin-top:35px;
    display:flex;
    flex-direction:column;
    gap:15px;
}

.links a{
    text-decoration:none;
    color:#fff;
    background:#1b1b1b;
    padding:18px 20px;
    border-radius:18px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    transition:0.3s ease;
    font-size:18px;
    font-weight:600;
}

.links a:hover{
    background:#00ff88;
    color:#000;
    transform:translateY(-3px);
}

.contact{
    margin-top:35px;
    padding-top:25px;
    border-top:1px solid #222;
    color:#999;
    font-size:14px;
    line-height:2;
}

@media(max-width:500px){

    .logo-box{
        width:150px;
    }

    .brand{
        font-size:34px;
    }

}
</style>
</head>

<body>

<div class="container">

    <div class="card">

        <div class="top-line"></div>

        <div class="content">
            <div class="logo-circle">
                <img src="Main Logo.jpg" alt="Axial Logo">
            </div>
            

            <h1 class="brand">AXIAL</h1>

            <p class="sub">WOODWORKING</p>

            <p class="about">
                Premium custom cabinetry, millwork, interior finishes,
                and modern woodworking craftsmanship built with precision.
            </p>

            <div class="links">

                <a href="https://www.instagram.com/axialwoodworking/" target="_blank">
                    <span>📸 Instagram</span>
                    <span>↗</span>
                </a>

                <a href="https://web.facebook.com/axialwoodworking?_rdc=1&_rdr#" target="_blank">
                    <span>📘 Facebook</span>
                    <span>↗</span>
                </a>

                <a href="https://tiktok.com" target="_blank">
                    <span>🎵 TikTok</span>
                    <span>↗</span>
                </a>

                <a href="https://www.youtube.com/@axialwoodworking" target="_blank">
                    <span>▶ YouTube</span>
                    <span>↗</span>
                </a>
                <div class="links">

                  
                
                    <a href="https://www.pinterest.com/axialwoodworking/" target="_blank">
                        <span>📌 Pinterest</span>
                        <span>↗</span>
                    </a>
                
                    <a href="http://yelp.com/biz/axial-woodworking-paramount-2" target="_blank">
                        <span>⭐ Yelp</span>
                        <span>↗</span>
                    </a>
                
                </div>

            </div>

            <div class="contact">
                <p>📍 Los Angeles, California</p>
                <p>📞 (818) 707-5471</p>
                <p>✉️ axialwoodworking@gmail.com</p>
            </div>

        </div>

    </div>

</div>

console.log("Axial Woodworking Website Loaded");

</script>

</body>
</html>
